<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .privacy-notice {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #0d8c6d;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 18px;
    }
    #status.error {
      color: #d32f2f;
    }
    #status.success {
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <div class="privacy-notice">
    This extension reads chat content from chatgpt.com only when you click Export.
    Your conversations never leave your browser.
  </div>
  <button type="button" id="exportBtn">Export current chat</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
